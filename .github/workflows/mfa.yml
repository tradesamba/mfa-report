name: MFA Daily Report

on:
  schedule:
    # Times are UTC. US Eastern = UTC-4 (EDT, Mar–Nov) or UTC-5 (EST, Nov–Mar).
    # ┌─ DST: cron is fixed UTC. Twice a year, bump BOTH lines' HOUR by 1 (minute unchanged):
    # │   Winter (EST, ~Nov→Mar): "13 12"→"13 13"  AND  "57 13"→"57 14"
    # │   Summer (EDT, ~Mar→Nov): "13 13"→"13 12"  AND  "57 14"→"57 13"
    # │   The MID-SESSION bump is the one that matters: left unshifted, "57 13" lands at 8:57 AM ET
    # │   in winter (before the 9:30 open) so intraday RVOL has no live session (degrades to EOD).
    # │   The pre-market bump just keeps it ~8:13 AM ET — cloud has no option chain, so small drift
    # │   here is harmless. No detection-logic change needed (window approach has margin).
    # └────────────────────────────────────────────────────────────────────────────────────────
    # Pre-market (EOD basis): ~8:10 AM ET -> 12:10 UTC (EDT). Runs WITHOUT --intraday.
    - cron: "13 12 * * 1-5"
    # Mid-session (intraday RVOL): ~10:00 AM ET. 57 13 UTC fires a few min early to beat
    # GitHub's cron lag so it lands near 10:00 EDT.
    - cron: "57 13 * * 1-5"
  workflow_dispatch:        # "Run workflow" button — trigger manually from GitHub web/mobile app

permissions:
  contents: read
  pages: write
  id-token: write

# allow only one concurrent deploy
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Decide intraday flag
        id: mode
        run: |
          # US market open ~13:30–20:00 UTC (EDT). Inside window -> use intraday RVOL.
          # Threshold MINS 810 = 13:30 UTC (summer open), 1200 = 20:00 UTC (close). In winter the
          # real open is 14:30 UTC, but this window is left at the EDT value on purpose: if the
          # mid-session cron is DST-bumped (see schedule above) it lands ~14:57 and is correctly
          # intraday; if NOT bumped it lands 13:57 and still flags intraday but pre-open RVOL just
          # falls back to EOD (harmless for cloud — no option chain depends on it).
          H=$(date -u +%H); M=$(date -u +%M)
          MINS=$((10#$H * 60 + 10#$M))
          if [ "$MINS" -ge 810 ] && [ "$MINS" -le 1200 ]; then
            echo "flag=--intraday"   >> "$GITHUB_OUTPUT"
            echo "slot=midsession"   >> "$GITHUB_OUTPUT"
            echo "other=premarket"   >> "$GITHUB_OUTPUT"
          else
            echo "flag="             >> "$GITHUB_OUTPUT"
            echo "slot=premarket"    >> "$GITHUB_OUTPUT"
            echo "other=midsession"  >> "$GITHUB_OUTPUT"
          fi

      - name: Generate report
        env:
          # Finnhub free-tier key (reliable forward earnings date + price cross-check).
          # Add it under repo Settings → Secrets and variables → Actions → New repository secret,
          # name FINNHUB_API_KEY. If unset, the run still works keyless (yfinance/FRED only).
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          # FRED API key (free, fred.stlouisfed.org). REQUIRED for macro/regime from Actions:
          # the keyless fredgraph.csv endpoint is blocked from GitHub's datacenter IPs, so add
          # FRED_API_KEY as a repo secret to use the official API. If unset, the run degrades to
          # keyless FRED (works locally but shows the FRED badge yellow from CI).
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          mkdir -p public
          # Carry forward the OTHER slot's already-published file so this deploy
          # (which replaces the whole Pages site) doesn't wipe it. Best-effort.
          BASE="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          curl -fsSL "$BASE/${{ steps.mode.outputs.other }}.html" \
            -o "public/${{ steps.mode.outputs.other }}.html" || echo "no prior ${{ steps.mode.outputs.other }}.html yet"
          # This run: write index.html (always latest) + this slot's named copy.
          python mfa_layer0.py --regime --alt ${{ steps.mode.outputs.flag }} \
            --json public/layer0_out.json --html public/index.html
          cp public/index.html "public/${{ steps.mode.outputs.slot }}.html"
          # Static landing page linking to all reports (committed in repo root).
          cp history.html public/history.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
